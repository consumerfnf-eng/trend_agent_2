<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Trend Agent — Trend Map</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root{--ink:#131313; --paper:#faf9f6; --hair:#e3e0da; --sub:#8a877f; --rising:#c8451f;
  --sticky:#ffe08a; --sticky2:#ffd45e}
*{box-sizing:border-box; margin:0}
body{background:#f3f1ec; color:var(--ink); font-family:'Inter','Noto Sans KR',sans-serif; font-size:13px}
header{background:var(--paper); border-bottom:1px solid var(--ink); padding:14px 22px;
  display:flex; align-items:center; gap:18px; flex-wrap:wrap}
header h1{font-family:'Playfair Display',serif; font-weight:900; font-size:22px; letter-spacing:.02em}
header h1 small{font-family:'Inter'; font-weight:600; font-size:10px; letter-spacing:.24em; color:var(--rising); display:block}
.viewsel,.timesel{display:flex; gap:6px}
.viewsel button,.timesel button{border:1px solid var(--ink); background:#fff; padding:6px 13px;
  font-size:10px; letter-spacing:.14em; text-transform:uppercase; font-weight:700; cursor:pointer; font-family:inherit}
.viewsel button.on,.timesel button.on{background:var(--ink); color:#fff}
.timesel{margin-left:auto}
.legend{font-size:10px; color:var(--sub); letter-spacing:.06em}

#canvas{position:relative; width:100%; height:calc(100vh - 61px); overflow:auto;
  background-image:radial-gradient(#d8d5cd 1px, transparent 1px); background-size:22px 22px}
#stage{position:relative; width:2100px; height:1150px}
svg#edges{position:absolute; inset:0; width:100%; height:100%; pointer-events:none}
.edge.tree{stroke:#c9c2b4; stroke-width:1.4; fill:none; opacity:.9}
.edge{fill:none; stroke:#9a968c; stroke-width:2}
.edge.key{stroke:var(--rising); stroke-width:2.5}
.edgelabel{font-size:10px; fill:var(--sub); font-family:'Inter'}

.node{position:absolute; transition:opacity .5s, transform .5s; opacity:0; transform:scale(.85)}
.node.show{opacity:1; transform:scale(1)}
.node.bundle{padding:8px 10px; background:#fff}
.node.bundle::before,.node.bundle::after{content:''; position:absolute; inset:0; background:#fff;
  border:1px solid var(--ink); z-index:-1}
.node.bundle::before{transform:rotate(1.6deg) translate(3px,3px)}
.node.bundle::after{transform:rotate(-1.2deg) translate(-3px,4px)}
.node.bundle .cnt{font-family:'Playfair Display',serif; font-size:20px}
.node.bundle .lbl{font-size:10px; color:var(--sub); letter-spacing:.08em}
.node.bundle{width:170px}
.bgrid{display:grid; grid-template-columns:1fr 1fr; gap:3px; margin-bottom:6px}
.bgrid img{width:100%; height:64px; object-fit:cover; display:block; border:1px solid var(--hair)}
.ntags{position:absolute; top:-11px; right:-8px; display:flex; gap:3px; z-index:2}
.ntags.rg{top:auto; bottom:6px; right:6px}
.ntag{cursor:pointer; font-size:8px; font-weight:800; letter-spacing:.08em; padding:2px 6px; color:#fff;
  box-shadow:1px 1px 0 #00000025; transform:rotate(2deg)}
.ntag.KR{background:#1a7a4a} .ntag.GL{background:#2b5db8} .ntag.CN{background:#c8451f}
.ntag.MLB{background:#131313} .ntag.DISCOVERY{background:#5b4632}
.ntag.DUVETICA{background:#6d28d9} .ntag.ST{background:#0e7490} .ntag.ALL{background:#8a877f}
.node .when{position:absolute; top:-16px; left:2px; font-size:9px; letter-spacing:.14em;
  color:var(--sub); text-transform:uppercase; font-weight:700}

.n-doc{width:190px; background:#fff; border:1px solid var(--hair); box-shadow:2px 3px 0 #00000012}
.n-doc img{width:100%; display:block}
.n-doc .cap{padding:7px 9px; font-size:11px; line-height:1.35}
.n-doc .src{font-size:9px; letter-spacing:.14em; color:var(--rising); font-weight:700; text-transform:uppercase}

.n-sticky{width:158px; background:var(--sticky); padding:11px 12px 20px; box-shadow:2px 3px 0 #00000018;
  font-size:12px; line-height:1.45; transform:rotate(-.6deg)}
.n-sticky.show{transform:rotate(-.6deg) scale(1)}
.n-sticky b{display:block; font-size:10px; letter-spacing:.12em; margin-bottom:3px}
.n-sticky .by{position:absolute; bottom:5px; right:9px; font-size:9px; color:#0006}

.n-photo{width:150px; background:#fff; padding:6px 6px 8px; border:1px solid var(--hair); box-shadow:2px 3px 0 #00000012}
.n-photo img{width:100%; display:block}
.n-photo .cap{font-size:10px; color:var(--sub); padding-top:5px}
.plat{display:inline-block; font-size:8px; letter-spacing:.1em; text-transform:uppercase; font-weight:800;
  padding:2px 5px; background:var(--ink); color:#fff; margin-right:4px}

.n-key{background:var(--ink); color:#fff; padding:14px 20px; box-shadow:3px 4px 0 #00000025}
.n-key .k{font-size:9px; letter-spacing:.24em; color:#fffa; text-transform:uppercase}
.n-key h3{font-family:'Playfair Display',serif; font-size:21px; font-weight:700; margin:2px 0 4px}
.n-key .m{font-size:10px; color:#fffc}
.n-key .badge{display:inline-block; background:var(--rising); font-size:9px; font-weight:800;
  letter-spacing:.12em; padding:2px 7px; margin-top:6px}

.n-brand{background:#fff; border:2px solid var(--ink); padding:10px 16px; text-align:center}
.n-brand .t{font-size:8px; letter-spacing:.18em; color:var(--sub); text-transform:uppercase}
.n-brand h4{font-family:'Playfair Display',serif; font-size:16px; font-weight:700}

.n-mv{background:var(--rising); color:#fff; padding:12px 18px; box-shadow:3px 4px 0 #00000025}
.n-mv .k{font-size:9px; letter-spacing:.22em; text-transform:uppercase; color:#fffb}
.n-mv h3{font-family:'Playfair Display',serif; font-size:19px; font-weight:700}

#side{position:fixed; left:0; top:61px; bottom:34px; width:224px; background:var(--paper);
  border-right:1px solid var(--ink); padding:14px 14px 20px; overflow-y:auto; z-index:5}
#side h4{font-size:10px; letter-spacing:.22em; text-transform:uppercase; color:var(--sub); margin-bottom:10px}
.sideitem{display:block; width:100%; text-align:left; background:#fff; border:1px solid var(--hair);
  padding:8px 10px; margin-bottom:7px; cursor:pointer; font-family:'Inter'}
.sideitem:hover{border-color:var(--ink)}
.sideitem .nm{font-family:'Playfair Display',serif; font-weight:700; font-size:13px; display:block}
.sideitem .mt{font-size:9px; color:var(--sub); letter-spacing:.06em}
.sideitem .bg{float:right; font-size:8px; font-weight:800; letter-spacing:.1em; padding:2px 5px; color:#fff}
.bg.RISING{background:var(--rising)} .bg.NEW{background:#1a7a4a}
.bg.WATCH{background:#8a877f} .bg.Active{background:#1a7a4a} .bg.Archived{background:#8a877f}
.sideitem.mv .nm{color:var(--rising)}
#canvas{margin-left:224px; width:calc(100% - 224px)}
#canvas.panning{cursor:grab}
#canvas.panning:active{cursor:grabbing}
#canvas.panning .node{pointer-events:none}
.node.pulse{animation:pulse 1.2s ease 2}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 #c8451f00} 40%{box-shadow:0 0 0 10px #c8451f55}}
.pankey{font-size:10px; color:var(--sub); border:1px solid var(--hair); padding:2px 7px; border-radius:3px}
#filterBar button{border:0; background:none; color:var(--rising); cursor:pointer; font:inherit; font-size:10px}

#detail{position:fixed; right:-360px; top:61px; bottom:34px; width:340px; background:var(--paper);
  border-left:1px solid var(--ink); z-index:8; overflow-y:auto; transition:right .25s; padding:16px 18px}
#detail.open{right:0}
#detail .x{position:absolute; top:10px; right:12px; border:0; background:none; font-size:18px; cursor:pointer}
#detail h2{font-family:'Playfair Display',serif; font-size:20px; margin:2px 0 2px}
#detail .k{font-size:9px; letter-spacing:.2em; color:var(--rising); text-transform:uppercase; font-weight:700}
#detail h5{font-size:10px; letter-spacing:.18em; text-transform:uppercase; color:var(--sub);
  border-top:1px solid var(--hair); padding-top:10px; margin:14px 0 7px}
#detail .why li{font-size:12px; line-height:1.5; margin-bottom:4px}
#detail .why{padding-left:16px}
#detail .ev{display:flex; gap:6px; flex-wrap:wrap}
#detail .ev img{width:96px; border:1px solid var(--hair)}
#detail .rel{font-size:11px; line-height:1.7}
#detail .rel b{font-size:9px; letter-spacing:.1em; color:var(--sub); font-weight:700}
#detail .stats{display:grid; grid-template-columns:1fr 1fr; gap:6px}
#detail .stats .s{border:1px solid var(--hair); padding:6px 8px; background:#fff}
#detail .stats .s b{display:block; font-size:14px}
#detail .stats .s span{font-size:9px; letter-spacing:.1em; color:var(--sub); text-transform:uppercase}
#detail .rel a{color:var(--rising); text-decoration:none; border-bottom:1px solid var(--rising)}
#detail .memo{background:var(--sticky); padding:10px 12px; font-size:12px; line-height:1.55; box-shadow:2px 2px 0 #00000015}
#detail .act{background:var(--ink); color:#fff; padding:10px 12px; font-size:12px; line-height:1.5}
.node{cursor:pointer}
footer{position:fixed; bottom:0; left:0; right:0; background:#131313e6; color:#fff; padding:8px 20px;
  font-size:11px; letter-spacing:.04em; display:flex; gap:16px; align-items:center}
footer b{color:var(--sticky)}
.empty{padding:60px 30px; color:var(--sub); font-size:13px; line-height:1.8}
.empty a{color:var(--rising)}
</style>
</head>
<body>
<header>
  <h1>TREND MAP<small>Trend Agent · Relations View</small></h1>
  <div class="viewsel" id="viewSel"></div>
  <div class="timesel" id="timeSel"></div>
  <span class="legend" id="legend"></span>
  <span class="pankey">SPACE + 드래그 = 이동</span>
  <span class="legend" id="filterBar">태그 클릭 = 필터</span>
</header>

<aside id="side"><h4>Key Trends — click to jump</h4><div id="sideList"></div></aside>
<div id="canvas"><div id="stage">
  <svg id="edges"></svg>
  <div id="nodes"></div>
</div></div>

<aside id="detail">
  <button class="x">×</button>
  <div class="k" id="dK"></div><h2 id="dH"></h2>
  <h5>Why now</h5><ul class="why" id="dWhy"></ul>
  <h5>Seen on</h5><div class="rel" id="dSeen"></div>
  <h5>Statistic</h5><div class="stats" id="dStats"></div>
  <h5>Summary</h5><div class="memo" id="dMemo"></div>
  <h5>Brand focus</h5><div class="act" id="dAct"></div>
  <h5>Links</h5><div class="rel" id="dLinks"></div>
</aside>
<footer><span>🗺 노드 = 원장의 documents · images · brands · entities 그대로 · 화살표 = 연결 · 시간축 = year_month</span>
<span style="margin-left:auto">시간 버튼을 눌러 맵이 자라나는 걸 보세요 <b>▶</b></span></footer>

<script src="config.js"></script>
<script type="module">
console.log("TREND AGENT map.html v260723-13");
import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

/* ══ 설정 — admin.html · index.html 과 같은 값이어야 합니다 ══ */
const SUPABASE_URL  = 'https://piifytwflubdtkzaiisi.supabase.co';
const SUPABASE_ANON  = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBpaWZ5dHdmbHViZHRremFpaXNpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQwODI5NDcsImV4cCI6MjA5OTY1ODk0N30.cVrgt7YQ99R-slePt8U2r_GmtDxetejZdqHcnqJmwhc';
/* ═══════════════════════════════════════════════════ */

const sb = createClient(SUPABASE_URL, SUPABASE_ANON);
const $  = s => document.querySelector(s);
const esc = x => String(x ?? '').replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const el = h => { const d = document.createElement('div'); d.innerHTML = h; return d.firstElementChild; };

/* brand_fit 의 ALL = 브랜드 전체. 태그 'ALL' 하나가 아니라 4개 브랜드로 펼쳐서 보여주고 필터도 겁니다 */
const ALL_BRANDS = ['MLB','DISCOVERY','SERGIO TACCHINI','DUVETICA'];
const expandTags = tags => {
  const out = [];
  for(const t of (tags || [])) (t === 'ALL' ? ALL_BRANDS : [t]).forEach(x => { if(!out.includes(x)) out.push(x); });
  return out;
};

let VIEWS = [], NODES = [], EDGES = [], ENTS = {}, BUNDLE_IMGS = {}, SRCCNT = {}, LINKED = {}, AUTO = [], curView = null, curTimeIdx = null, TAGFILTER = null;

/* ── 시간축: 뷰에 times 가 비어 있으면 노드의 t 에서 자동으로 만듭니다 ── */
const timesOf = v => {
  const set = new Set((v.times || []).filter(Boolean));
  NODES.filter(n => n.view_id === v.view_id).forEach(n => n.t && set.add(n.t));
  return [...set].sort();
};

async function load(){
  const [vw, nd, eg, en, sr] = await Promise.all([
    sb.from('map_views').select('*').order('sort_order'),
    sb.from('v_map_nodes').select('*'),
    sb.from('map_edges').select('*'),
    sb.from('entities').select('entity_id,name_kr,name_en,axis,notes,proposal,first_seen,status,brand_fit,parent_movement,pinned'),
    sb.from('sources').select('source_id,stage')
  ]);
  for(const r of [vw, nd, eg, en, sr]) if(r.error){ fail(r.error.message); return; }
  SRCMAP = Object.fromEntries(sr.data.map(x => [x.source_id, x.stage]));
  VIEWS = vw.data; NODES = nd.data; EDGES = eg.data;
  ENTS = Object.fromEntries(en.data.map(e => [e.entity_id, e]));

  const { data:sc } = await sb.from('v_entity_source_count').select('*');
  SRCCNT = Object.fromEntries((sc||[]).map(r => [r.entity_id, r.source_count]));

  /* 사진·기사가 어느 키워드에 붙었는지 — 맵 노드에는 entity_id 가 없으므로 여기서 잇습니다 */
  const [ael, del] = await Promise.all([
    sb.from('asset_entities').select('image_id,entity_id').limit(4000),
    sb.from('document_entities').select('doc_id,entity_id').limit(2000)
  ]);
  LINKED = {};
  for(const r of (ael.data||[])) (LINKED['img:'+r.image_id] ||= []).push(r.entity_id);
  for(const r of (del.data||[])) (LINKED['doc:'+r.doc_id]  ||= []).push(r.entity_id);

  /* 묶음 노드에 엔티티가 걸려 있으면 그 키워드의 사진들을 안에 채웁니다 */
  const bids = [...new Set(NODES.filter(n => n.kind === 'bundle' && n.entity_id).map(n => n.entity_id))];
  BUNDLE_IMGS = {};
  if(bids.length){
    const { data: bi } = await sb.from('asset_entities')
      .select('entity_id, images(thumb_url)').in('entity_id', bids).limit(400);
    for(const r of (bi || [])){
      if(!r.images?.thumb_url) continue;
      (BUNDLE_IMGS[r.entity_id] ||= []).push(r.images.thumb_url);
    }
  }

  /* 맵에 올린 키워드에 연결된 피드를 자동으로 가지에 매답니다 (따로 노드를 안 올려도 됨) */
  await buildAutoLeaves();

  if(!VIEWS.length){ fail('맵 뷰가 없습니다. schema.sql 을 실행하셨나요?'); return; }
  curView = curView || VIEWS[0].view_id;

  $('#viewSel').innerHTML = VIEWS.map(v =>
    `<button class="${v.view_id===curView?'on':''}" data-v="${esc(v.view_id)}">${esc(v.name_kr)}</button>`).join('');
  $('#viewSel').querySelectorAll('button').forEach(b => b.onclick = () => {
    curView = b.dataset.v; curTimeIdx = null; TAGFILTER = null; load();
  });
  render();
}
function fail(msg){
  $('#nodes').innerHTML = `<div class="empty"><b>${esc(msg)}</b><br><br>
    맵에 노드를 놓으려면 <a href="admin.html">관리자 → 맵</a> 으로 가세요.</div>`;
}

/* ── 노드 마크업 — mockup 과 동일 ── */
/* ═══ 마인드맵 트리 배치 ═══
   MOVEMENT(뿌리) → 속한 KEY TREND(가지) → 그 아래 붙은 사진·기사·메모(잎)
   같은 줄기는 세로로 묶여 있고, 줄기끼리는 넉넉히 띄웁니다.
   부모가 없는 노드는 맨 아래 '미분류' 줄기에 모입니다. */
/* 맵에 올린 키워드 → 연결된 사진·기사를 가상 노드로 (키워드당 최대 6개, 최근순) */
const AUTO_MAX = 6;
async function buildAutoLeaves(){
  AUTO = [];
  const eids = [...new Set(NODES.filter(n => (n.kind==='key'||n.kind==='mv') && n.entity_id).map(n => n.entity_id))];
  if(!eids.length) return;

  const haveImg = new Set(NODES.map(n => n.image_id).filter(Boolean));
  const haveDoc = new Set(NODES.map(n => n.doc_id).filter(Boolean));

  const [im, dc] = await Promise.all([
    sb.from('asset_entities')
      .select('entity_id, images!inner(image_id,thumb_url,note,account,year_month,source_id,region,post_date)')
      .in('entity_id', eids).limit(600),
    sb.from('document_entities')
      .select('entity_id, documents!inner(doc_id,title,summary,publisher,year_month,source_id,region,thumb_url)')
      .in('entity_id', eids).limit(300)
  ]);

  const per = {};
  for(const r of (im.data||[])){
    const g = r.images; if(!g || haveImg.has(g.image_id)) continue;
    if((per[r.entity_id] = (per[r.entity_id]||0) + 1) > AUTO_MAX) continue;
    AUTO.push({ node_id:'auto-i-'+g.image_id, view_id:null, kind:'photo', t:g.year_month || '',
      image_id:g.image_id, entity_id:r.entity_id, _auto:true,
      r_thumb:g.thumb_url, r_headline:g.note || g.account || '', r_badge:(g.source_id||'').toUpperCase(),
      r_tags:[g.region || 'KR'] });
  }
  const perD = {};
  for(const r of (dc.data||[])){
    const g = r.documents; if(!g || haveDoc.has(g.doc_id)) continue;
    if((perD[r.entity_id] = (perD[r.entity_id]||0) + 1) > AUTO_MAX) continue;
    AUTO.push({ node_id:'auto-d-'+g.doc_id, view_id:null, kind:'doc', t:g.year_month || '',
      doc_id:g.doc_id, entity_id:r.entity_id, _auto:true,
      r_thumb:g.thumb_url, r_headline:g.title || (g.summary||'').slice(0,50),
      r_badge:(g.publisher || g.source_id || '').toUpperCase(), r_tags:[g.region || 'KR'] });
  }
}

/* 이 노드가 어느 키워드(KEY TREND / MOVEMENT)에 속하는지 */
function hostEnt(n, hosts){
  if(n.entity_id && hosts.has(n.entity_id)) return n.entity_id;
  const keys = [];
  if(n.image_id) keys.push('img:' + n.image_id);
  if(n.doc_id)   keys.push('doc:' + n.doc_id);
  for(const k of keys)
    for(const eid of (LINKED[k] || []))
      if(hosts.has(eid)) return eid;
  return null;
}

const NW = { mv:230, key:220, brand:190, bundle:250, photo:230, doc:230, sticky:210 };
const NH = { mv:120, key:150, brand:130, bundle:430, photo:390, doc:290, sticky:170 };
const COL = [40, 330, 620];          // 깊이 0·1·2 의 x 위치
const GAPY = 26, TRUNKGAP = 60;

function autoLayout(list){
  const byEnt = {};
  for(const n of list) if(n.entity_id) (byEnt[n.entity_id] ||= []).push(n);

  const mvNodes  = list.filter(n => n.kind === 'mv');
  const keyNodes = list.filter(n => n.kind === 'key');
  const hosts = new Set([...mvNodes, ...keyNodes].map(n => n.entity_id).filter(Boolean));
  const leafOf   = {};               // entity_id → 잎 노드들 (사진·기사·메모·묶음)
  const orphans  = [];
  for(const n of list){
    if(n.kind === 'mv' || n.kind === 'key') continue;
    const host = hostEnt(n, hosts);
    host ? (leafOf[host] ||= []).push(n) : orphans.push(n);
  }

  const kidsOf = mv => keyNodes
    .filter(k => ENTS[k.entity_id]?.parent_movement === mv.entity_id)
    .sort((a,b) => (SRCCNT[b.entity_id]||0) - (SRCCNT[a.entity_id]||0));
  const used = new Set();
  let y = 40;

  const placeLeaves = (host, x, startY) => {
    let ly = startY;
    for(const lf of (leafOf[host] || []).sort((a,b) => String(a.t).localeCompare(String(b.t)))){
      lf.x = x; lf.y = ly; used.add(lf.node_id);
      ly += (NH[lf.kind] || 260) + GAPY;
    }
    return ly;
  };

  /* 1) MOVEMENT 줄기 */
  for(const mv of mvNodes.sort((a,b) => String(a.t).localeCompare(String(b.t)))){
    const trunkTop = y;
    mv.x = COL[0]; mv.y = y; used.add(mv.node_id);
    let branchY = y;
    branchY = placeLeaves(mv.entity_id, COL[1], branchY);      // MOVEMENT 직속 자료
    for(const k of kidsOf(mv)){
      k.x = COL[1]; k.y = branchY; used.add(k.node_id);
      const after = placeLeaves(k.entity_id, COL[2], branchY);
      branchY = Math.max(branchY + NH.key + GAPY, after);
    }
    y = Math.max(branchY, trunkTop + NH.mv + GAPY) + TRUNKGAP;
  }

  /* 2) 상위 흐름이 없는 KEY TREND — 자기 줄기로 */
  for(const k of keyNodes.filter(k => !used.has(k.node_id))
        .sort((a,b) => (SRCCNT[b.entity_id]||0) - (SRCCNT[a.entity_id]||0))){
    k.x = COL[1]; k.y = y; used.add(k.node_id);
    const after = placeLeaves(k.entity_id, COL[2], y);
    y = Math.max(y + NH.key + GAPY, after) + TRUNKGAP / 2;
  }

  /* 3) 어디에도 안 붙은 자료 — 맨 아래 격자로 */
  if(orphans.length){
    let ox = COL[2], oy = y + 20;
    for(const n of orphans.sort((a,b) => String(a.t).localeCompare(String(b.t)))){
      n.x = ox; n.y = oy; used.add(n.node_id);
      ox += (NW[n.kind] || 230) + 24;
      if(ox > COL[2] + 3 * 260){ ox = COL[2]; oy += (NH[n.kind] || 290) + GAPY; }
    }
  }
}

/* 부모 → 자식 선을 데이터에서 직접 그립니다 (map_edges 없이도) */
function treeLinks(list){
  const at = {};                       // entity_id → 그 키워드의 카드 노드
  for(const n of list) if((n.kind === 'key' || n.kind === 'mv') && n.entity_id) at[n.entity_id] ||= n;
  const hosts = new Set(Object.keys(at));
  const out = [];
  for(const n of list){
    if(n.kind === 'mv') continue;
    if(n.kind === 'key'){
      const pm = ENTS[n.entity_id]?.parent_movement;
      if(pm && at[pm]) out.push([at[pm], n]);
      continue;
    }
    const h = hostEnt(n, hosts);       // 사진·기사·메모 → 붙은 키워드
    if(h && at[h] && at[h] !== n) out.push([at[h], n]);
  }
  return out;
}

function nodeHtml(n){
  if(n._auto) n.locked = true;
  const xt = expandTags(n.r_tags);
  const regions = xt.filter(t => ['KR','GL','CN'].includes(t));
  const brands  = xt.filter(t => !['KR','GL','CN'].includes(t));
  const tagHtml = brands.length
    ? `<div class="ntags">${brands.map(t => `<span class="ntag ${t==='SERGIO TACCHINI'?'ST':esc(t)}" data-t="${esc(t)}">${t==='SERGIO TACCHINI'?'ST':esc(t)}</span>`).join('')}</div>` : '';
  const rgHtml = regions.length
    ? `<div class="ntags rg">${regions.map(t => `<span class="ntag ${esc(t)}" data-t="${esc(t)}">${esc(t)}</span>`).join('')}</div>` : '';
  const when = `<span class="when">${esc(n.t)}</span>${tagHtml}${rgHtml}`;
  const id = `n-${esc(n.node_id)}`, pos = `left:${n.x}px;top:${n.y}px` + (n.w ? `;width:${n.w}px` : '');
  const img = n.r_img ? `<img src="${esc(n.r_img)}" loading="lazy" alt="">` : '';

  switch(n.kind){
    case 'doc': return `<div class="node n-doc" id="${id}" style="${pos}">${when}${img}
      <div class="cap"><span class="src">${esc(n.r_source || '')}</span><br>${esc(n.r_caption || n.r_headline || '')}</div></div>`;
    case 'sticky': return `<div class="node n-sticky" id="${id}" style="${pos}">${when}
      <b>${esc(n.label || n.t)}</b>${esc(n.r_headline || '')}<span class="by">${esc(n.r_source || n.note_by || '')}</span></div>`;
    case 'photo': return `<div class="node n-photo" id="${id}" style="${pos}">${when}${img}
      <div class="cap"><span class="plat">${esc(n.r_plat || '')}</span>${esc(n.r_caption || '')}</div></div>`;
    case 'key': return `<div class="node n-key" id="${id}" style="${pos}">${when}
      <div class="k">${esc(n.r_kicker || 'KEY TREND')}</div><h3>${esc(n.r_headline || '')}</h3>
      <div class="m">${esc(n.r_meta || '')}</div>
      ${n.r_badge ? `<span class="badge">${esc(n.r_badge)}</span>` : ''}</div>`;
    case 'brand': return `<div class="node n-brand" id="${id}" style="${pos}">${when}
      <div class="t">${esc(n.r_kicker || '')}</div><h4>${esc(n.r_headline || '')}</h4></div>`;
    case 'mv': return `<div class="node n-mv" id="${id}" style="${pos}">${when}
      <div class="k">${esc(n.r_kicker || 'PARENT MOVEMENT')}</div><h3>${esc(n.r_headline || '')}</h3></div>`;
    case 'bundle': {
      const imgs = (n.entity_id && BUNDLE_IMGS[n.entity_id]) || [];
      const grid = imgs.length ? `<div class="bgrid">${imgs.slice(0,4).map(u=>`<img src="${esc(u)}" loading="lazy" alt="">`).join('')}</div>` : '';
      const cnt = n.cnt || (imgs.length ? `×${imgs.length}` : '');
      return `<div class="node bundle" id="${id}" style="${pos}">${when}${grid}
      <div class="cnt">${esc(cnt)}</div><div class="lbl">${esc(n.label || n.r_headline || '')}</div></div>`;
    }
    default: return '';
  }
}

function center(id){
  const e = document.getElementById('n-' + id); if(!e) return { x:0, y:0 };
  const s = $('#stage').getBoundingClientRect(), r = e.getBoundingClientRect();
  return { x: r.left - s.left + r.width/2, y: r.top - s.top + r.height/2 };
}
const ymNum = s => { const m = String(s).match(/^(\d{4})-(\d{2})$/); return m ? +m[1]*12 + +m[2] : null; };

function render(){
  const V = VIEWS.find(v => v.view_id === curView);
  const real = NODES.filter(n => n.view_id === curView);
  const onView = new Set(real.filter(n => n.kind==='key' || n.kind==='mv').map(n => n.entity_id).filter(Boolean));
  const autoHere = AUTO.filter(a => onView.has(a.entity_id))
    .map(a => ({ ...a, view_id: curView, t: a.t || real.find(r => r.entity_id === a.entity_id)?.t || '' }));
  const mine = [...real, ...autoHere];
  const times = [...new Set([...timesOf(V), ...mine.map(n => n.t).filter(Boolean)])].sort();
  $('#legend').textContent = V.legend || '';

  if(!mine.length){ fail('이 뷰에 놓인 노드가 없습니다.'); $('#timeSel').innerHTML=''; $('#sideList').innerHTML=''; return; }
  if(curTimeIdx === null || curTimeIdx >= times.length) curTimeIdx = times.length - 1;   // 처음엔 최신 달 — 방금 올린 게 바로 보입니다

  $('#timeSel').innerHTML = times.map((t,i) =>
    `<button class="${i===curTimeIdx?'on':''}" data-i="${i}">${esc(t)}</button>`).join('');
  $('#timeSel').querySelectorAll('button').forEach(b =>
    b.onclick = () => { curTimeIdx = +b.dataset.i; render(); });

  autoLayout(mine);
  const nz = $('#nodes'); nz.innerHTML = '';
  mine.forEach(n => { const e = el(nodeHtml(n)); if(e) nz.appendChild(e); });

  /* 시간축까지 등장한 노드만. 활동 월이 있으면 3개월 무활동 시 숨김 — mockup 만료 규칙 그대로 */
  const curYm = ymNum(times[curTimeIdx]);
  const visible = {};
  mine.forEach(n => {
    if(times.indexOf(n.t) > curTimeIdx) return;
    if(n.active && n.active.length && curYm != null){
      let last = -1;
      n.active.forEach(a => { const v = ymNum(a); if(v != null && v <= curYm) last = Math.max(last, v); });
      if(last < 0 || curYm - last >= 3) return;
    }
    visible[n.node_id] = true;
  });

  renderSide(mine, visible);
  requestAnimationFrame(() => {
    mine.forEach(n => { if(visible[n.node_id]) document.getElementById('n-' + n.node_id)?.classList.add('show'); });
    applyTagFilter();

    const defs = `<defs>
      <marker id="arr" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
        <path d="M0,0 L7,3 L0,6" fill="none" stroke="#9a968c" stroke-width="1.4"/></marker>
      <marker id="arrk" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
        <path d="M0,0 L7,3 L0,6" fill="none" stroke="#c8451f" stroke-width="1.6"/></marker></defs>`;
    let paths = '';
    /* 데이터에서 나오는 부모→자식 연결 (마인드맵 가지) */
    treeLinks(mine).forEach(([P, C]) => {
      if(!visible[P.node_id] || !visible[C.node_id]) return;
      const A = center(P.node_id), B = center(C.node_id);
      const mx = A.x + (B.x - A.x) * 0.55;
      paths += `<path class="edge tree" d="M${A.x},${A.y} C${mx},${A.y} ${mx},${B.y} ${B.x},${B.y}"/>`;
    });
    EDGES.filter(e => e.view_id === curView).forEach(e2 => {
      if(!visible[e2.a] || !visible[e2.b]) return;
      const A = center(e2.a), B = center(e2.b);
      const mx = (A.x+B.x)/2, my = (A.y+B.y)/2 - 34;
      paths += `<path class="edge${e2.is_key?' key':''}" d="M${A.x},${A.y} Q${mx},${my} ${B.x},${B.y}"
        marker-end="url(#${e2.is_key?'arrk':'arr'})"/>`;
      if(e2.label) paths += `<text class="edgelabel" x="${mx}" y="${my+8}" text-anchor="middle">${esc(e2.label)}</text>`;
    });
    $('#edges').innerHTML = defs + paths;
  });
}

function renderSide(mine, visible){
  const list = mine.filter(n => (n.kind==='key' || n.kind==='mv') && visible[n.node_id]);
  $('#sideList').innerHTML = list.map(n =>
    `<button class="sideitem${n.kind==='mv'?' mv':''}" data-id="${esc(n.node_id)}">
      ${n.r_badge ? `<span class="bg ${esc(n.r_badge)}">${esc(n.r_badge)}</span>` : ''}
      <span class="nm">${esc(n.r_headline || '')}</span>
      <span class="mt">${esc(n.r_kicker || '')}</span></button>`).join('')
    || '<div class="legend">이 시점에 KEY TREND 가 없습니다</div>';
  $('#sideList').querySelectorAll('.sideitem').forEach(b => b.onclick = () => jumpTo(b.dataset.id));
}

function jumpTo(id){
  const V = VIEWS.find(v => v.view_id === curView), times = timesOf(V);
  const n = NODES.find(x => x.node_id === id); if(!n) return;
  const ti = times.indexOf(n.t);
  if(ti > curTimeIdx){ curTimeIdx = ti; render(); }
  setTimeout(() => {
    const e = document.getElementById('n-' + id); if(!e) return;
    e.scrollIntoView({ behavior:'smooth', block:'center', inline:'center' });
    e.classList.add('pulse'); setTimeout(() => e.classList.remove('pulse'), 2600);
    openDetail(id);
  }, ti > curTimeIdx ? 620 : 0);
}

/* ── 태그 필터 ── */
function applyTagFilter(){
  document.querySelectorAll('.node').forEach(node => {
    if(!node.classList.contains('show')) return;
    const n = NODES.find(x => 'n-' + x.node_id === node.id);
    const pass = !TAGFILTER || expandTags(n?.r_tags).includes(TAGFILTER);
    node.style.opacity = pass ? 1 : .12;
  });
  $('#filterBar').innerHTML = TAGFILTER
    ? `<span class="ntag ${esc(TAGFILTER)}">${TAGFILTER==='SERGIO TACCHINI'?'ST':esc(TAGFILTER)}</span> 만 보는 중 <button id="filterX">해제 ×</button>`
    : '태그 클릭 = 필터';
  const x = $('#filterX'); if(x) x.onclick = () => { TAGFILTER = null; applyTagFilter(); };
}

/* ── 상세 패널 ──
   mockup 의 MoM / Volume / Diffusion / Saturation 을 sources.stage 로 계산합니다.
   stage = leading → early → mainstream → lagging (확산 단계). 원래 이 모델로 설계돼 있습니다. */
const STAGES = ['leading','early','mainstream','lagging'];
const STAGE_KR = { leading:'선행', early:'초기', mainstream:'주류', lagging:'후행' };
let SRCMAP = {};

const ymN = t => { const m = String(t||'').match(/^(\d{4})-(\d{2})/); return m ? +m[1]*12 + +m[2] : null; };

async function openDetail(id){
  const n = NODES.find(x => x.node_id === id); if(!n) return;
  $('#dK').textContent = n.r_kicker || n.kind.toUpperCase();
  $('#dH').textContent = n.r_headline || '';
  $('#detail').classList.add('open');

  if(!n.entity_id){
    $('#dWhy').innerHTML   = '<li>원장 항목이 연결되지 않은 노드입니다</li>';
    $('#dSeen').innerHTML  = '—';
    $('#dStats').innerHTML = '';
    $('#dMemo').textContent = n.r_meta || n.r_caption || '—';
    $('#dAct').textContent  = '—';
    $('#dLinks').innerHTML  = '—';
    return;
  }

  const e = ENTS[n.entity_id];
  const [ae, de, re_] = await Promise.all([
    sb.from('asset_entities').select('role,images(image_id,thumb_url,account,is_celeb,celeb_name,likes,source_id,year_month,post_date,created_at)').eq('entity_id', n.entity_id),
    sb.from('document_entities').select('documents(doc_id,title,publisher,source_url,source_id,year_month)').eq('entity_id', n.entity_id),
    sb.from('ranking_entities').select('rankings(id,rank,product_name,platform,source_id,year_month)').eq('entity_id', n.entity_id)
  ]);
  const imgs = (ae.data||[]).map(r => r.images).filter(Boolean);
  const docs = (de.data||[]).map(r => r.documents).filter(Boolean);
  const rnks = (re_.data||[]).map(r => r.rankings).filter(Boolean);
  const all  = [...imgs, ...docs, ...rnks];

  /* 확산 단계 */
  const srcIds = [...new Set(all.map(x => x.source_id).filter(Boolean))];
  const stages = [...new Set(srcIds.map(sid => SRCMAP[sid]).filter(Boolean))];
  const reached = STAGES.filter(st => stages.includes(st));
  const deep = reached.length ? STAGES.indexOf(reached[reached.length-1]) : -1;

  const diffusion = reached.length >= 3 ? `Strong · ${reached.length} stages`
                  : reached.length === 2 ? `Moderate · 2 stages`
                  : reached.length === 1 ? `Weak · 1 stage` : '—';
  const saturation = deep >= 3 ? 'High' : deep === 2 ? 'Mid' : deep >= 0 ? 'Low' : '—';

  /* MoM — 이번 달 대비 지난 달 자료 수 */
  const cur = ymN(n.t) ?? ymN(new Date().toISOString().slice(0,7));
  const at = x => ymN(x.post_date || x.year_month || x.created_at);
  const nCur = all.filter(x => at(x) === cur).length;
  const nPrev = all.filter(x => at(x) === cur - 1).length;
  const mom = nPrev ? `${nCur >= nPrev ? '+' : ''}${Math.round((nCur - nPrev) / nPrev * 100)}%`
            : nCur ? 'NEW' : '—';

  const volume = all.length >= 12 ? 'High' : all.length >= 5 ? 'Mid' : all.length ? 'Low' : '—';

  /* WHY NOW */
  const why = [];
  const accts = [...new Set(imgs.map(x => x.account).filter(Boolean))];
  if(accts.length) why.push(`계정 ${accts.length}개 · 사진 ${imgs.length}건`);
  if(docs.length)  why.push(`문서 ${docs.length}건 — ${[...new Set(docs.map(d=>d.publisher).filter(Boolean))].slice(0,3).join(', ') || '출처 미상'}`);
  if(rnks.length){
    const best = Math.min(...rnks.map(r => r.rank).filter(Boolean));
    why.push(`리테일 랭킹 진입 — 최고 ${best}위`);
  }
  if(reached.length >= 2) why.push(`${reached.map(x => STAGE_KR[x]).join(' → ')} 로 확산`);
  if(saturation === 'Low' && all.length) why.push('시장 saturation Low — 진입 기회');
  if(saturation === 'High') why.push('시장 saturation High — 선제 대응 필요');

  /* SEEN ON */
  const celebs = imgs.filter(x => x.is_celeb && x.celeb_name);
  const others = accts.filter(a => !celebs.some(c => c.account === a));
  let seen = celebs.length
    ? `셀럽 착장 ${celebs.length}건 — ${celebs.slice(0,3).map(c => `${c.celeb_name} (${c.year_month||''})`).join(', ')}`
      + (others.length ? ` · 일반 계정 ${others[0]} 외 ${others.length-1}` : '')
    : accts.length ? `일반 계정 ${accts.slice(0,4).join(', ')}${accts.length>4?` 외 ${accts.length-4}`:''}`
    : '착장 데이터 없음';
  const ev = imgs.filter(x => x.thumb_url).slice(0,6);
  if(ev.length) seen += `<div class="ev" style="margin-top:8px">${ev.map(x=>`<img src="${esc(x.thumb_url)}" loading="lazy" alt="">`).join('')}</div>`;

  $('#dWhy').innerHTML   = (why.length ? why : ['연결된 자료가 아직 없습니다']).map(w => `<li>${esc(w)}</li>`).join('');
  $('#dSeen').innerHTML  = seen;
  $('#dStats').innerHTML = [['MoM',mom],['Volume',volume],['Diffusion',diffusion],['Saturation',saturation]]
    .map(([k,v]) => `<div class="s"><b>${esc(v)}</b><span>${esc(k)}</span></div>`).join('');
  $('#dMemo').textContent = e?.notes || n.r_meta || '메모가 아직 없습니다 — 관리자 → 사전에서 채우세요';
  $('#dAct').textContent  = e?.proposal || '적용 제안이 아직 없습니다 — 관리자 → 사전에서 채우세요';
  const links = docs.filter(d => d.source_url).slice(0,5).map(d => ({ label: d.title || d.publisher, url: d.source_url }));
  $('#dLinks').innerHTML = links.length
    ? links.map(l => `<a href="${esc(l.url)}" target="_blank" rel="noopener">${esc(l.label)}</a><br>`).join('')
    : '—';
}
$('#detail .x').onclick = () => $('#detail').classList.remove('open');

/* ── 클릭: 태그 = 필터, 노드 = 상세 ── */
$('#nodes').addEventListener('click', e => {
  const tag = e.target.closest('.ntag');
  if(tag){ TAGFILTER = TAGFILTER === tag.dataset.t ? null : tag.dataset.t; applyTagFilter(); return; }
  const node = e.target.closest('.node');
  if(node) openDetail(node.id.slice(2));
});

/* ── SPACE + 드래그로 이동 ── */
let panning = false, sx = 0, sy = 0, sl = 0, st = 0;
addEventListener('keydown', e => { if(e.code === 'Space' && !panning){ $('#canvas').classList.add('panning'); e.preventDefault(); } });
addEventListener('keyup',   e => { if(e.code === 'Space'){ $('#canvas').classList.remove('panning'); } });
$('#canvas').addEventListener('mousedown', e => {
  if(!$('#canvas').classList.contains('panning')) return;
  panning = true; sx = e.clientX; sy = e.clientY; sl = $('#canvas').scrollLeft; st = $('#canvas').scrollTop;
});
addEventListener('mousemove', e => {
  if(!panning) return;
  $('#canvas').scrollLeft = sl - (e.clientX - sx);
  $('#canvas').scrollTop  = st - (e.clientY - sy);
});
addEventListener('mouseup', () => { panning = false; });

load();
</script>
</body>
</html>
