<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TREND AGENT — Live Feed &amp; Key Brand</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{--paper:#faf7f2; --ink:#1d1d1b; --sub:#8a8578; --hair:#e4ded2; --rising:#c8451f; --new:#1a7a4a; --sticky:#ffe98a}
*{margin:0;padding:0;box-sizing:border-box}
body{background:#faf7f2; color:var(--ink); font-family:'Noto Sans KR',sans-serif}
header{display:flex; align-items:center; gap:22px; padding:14px 26px; border-bottom:1px solid var(--ink); position:sticky; top:0; background:var(--paper); z-index:10; flex-wrap:wrap}
header h1{font-family:'Playfair Display',serif; font-size:22px}
.tabs button{border:1px solid var(--ink); background:transparent; padding:7px 16px; font-size:11px; letter-spacing:.15em; cursor:pointer; font-weight:700; font-family:inherit}
.tabs button.on{background:var(--ink); color:#fff}
#mapWrap{position:relative; height:calc(100vh - 118px); overflow:hidden; background:#f3f1ec}
#mapFrame{width:100%; height:100%; border:0}
.tabs a{border:1px solid var(--ink); background:transparent; padding:7px 16px; font-size:11px; letter-spacing:.15em; font-weight:700; text-decoration:none; color:var(--ink); display:inline-block}
.note{margin-left:auto; font-size:10px; letter-spacing:.14em; color:var(--sub); text-transform:uppercase}
.view{display:none} .view.on{display:block}
/* ── LIVE FEED ── */
#feedWrap{display:flex}
#dateRail{position:sticky; top:57px; align-self:flex-start; min-width:120px; height:calc(100vh - 57px);
  border-right:1px solid var(--hair); padding:18px 0; overflow-y:auto}
#dateRail .d{display:block; width:100%; text-align:left; border:0; background:none; cursor:pointer;
  padding:7px 18px; font-size:12px; color:var(--sub); border-left:3px solid transparent; font-family:inherit}
#dateRail .d.on{color:var(--ink); font-weight:700; border-left-color:var(--rising)}
#feedMain{flex:1; padding:26px 30px; min-width:0}
.dgroup{margin-bottom:36px}
.dgroup h2{font-family:'Playfair Display',serif; font-size:26px; border-bottom:1px solid var(--ink); padding-bottom:8px; margin-bottom:16px}
.grid{display:grid; grid-template-columns:repeat(auto-fill,minmax(230px,1fr)); gap:20px}
.feedgrid{display:grid; grid-template-columns:repeat(auto-fill, minmax(330px, 1fr)); gap:14px}
.fcard{position:relative; display:flex; gap:0; background:#fff; border:1px solid #efe8dd; border-radius:14px;
  overflow:hidden; text-decoration:none; color:var(--ink); box-shadow:0 1px 3px #0000000a; transition:.18s}
.fcard:hover{box-shadow:0 6px 18px #00000012; transform:translateY(-2px); border-color:#e2d8c8}
.fcard .fl{flex:1; padding:15px 14px 13px; min-width:0}
.fcard .hd{display:flex; align-items:baseline; gap:8px; margin-bottom:3px}
.fcard .rk{font-family:'Playfair Display',serif; font-size:19px; font-weight:700; color:#dcd2c2; line-height:1}
.fcard h3{font-size:14.5px; font-weight:700; line-height:1.3; word-break:keep-all; display:flex; align-items:center; gap:6px}
.fcard .bar{height:5px; border-radius:3px; background:#f3ede3; overflow:hidden; margin-bottom:7px}
.fcard .bar i{display:block; height:100%; border-radius:3px}
.fcard .stat{font-size:10.5px; color:#6b675e; line-height:1.5; margin-bottom:8px}
.fcard .stat b{font-weight:700; color:var(--ink)}
.fcard .sub{font-size:10px; color:#a39a8b; letter-spacing:.04em; margin-bottom:4px}
.fcard .line{font-size:11.5px; color:#5d594f; line-height:1.5; margin-bottom:9px;
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis}
.fcard .apply{font-size:10.5px; color:#5d594f; background:#fdf6f1; border:1px solid #f0e0d4;
  border-radius:7px; padding:6px 9px; margin-bottom:8px; line-height:1.45}
.fcard .apply b{color:#c8451f}
.fcard .apply.muted{background:#f9f6f0; border-color:#ece5d9; color:#a39a8b}
.fcard .apply.muted b{color:#8a8172}
.stg{position:absolute; top:8px; right:8px; font-size:8.5px; font-weight:800; letter-spacing:.1em;
  padding:3px 8px; border-radius:9px; color:#fff; z-index:2}
.stg.PEAK{background:#c8451f} .stg.ONGOING{background:#1a7a4a}
.stg.CLASSIC{background:#5a6b7d} .stg.DECREASING{background:#a39a8b} .stg.NEW{background:#b8860b}
.fcard .tags{display:flex; flex-wrap:wrap; gap:4px}
.fcard .tags span{font-size:9px; background:#f7f2e9; color:#8a8172; padding:2.5px 8px; border-radius:9px}
.fcard .ph{width:104px; flex:0 0 104px; object-fit:cover; align-self:stretch; background:#f0ebe2}
.fcard .ph.noimg{background:repeating-linear-gradient(45deg,#f5f0e7,#f5f0e7 6px,#efe8dd 6px,#efe8dd 12px)}

.fcard:hover{transform:translateY(-3px)}
.fcard:focus-visible{outline:2px solid var(--rising); outline-offset:2px}
.fcard .th{height:210px; background-size:cover; background-position:top center; background-color:#efeae1}
.fcard:hover .th{filter:brightness(1.04)}
.fcard .bd{padding:7px 9px}
.fcard h3{font-family:'Playfair Display',serif; font-size:12.5px; margin-bottom:2px; word-break:keep-all}
.fcard .meta{font-size:9px; color:var(--sub); line-height:1.45}
.badge{position:absolute; top:8px; right:8px; font-size:9px; font-weight:800; letter-spacing:.12em; padding:4px 9px; color:#fff; z-index:1}
.badge.MAIN{background:var(--rising)} .badge.FEED{background:#9a938a} .badge.NEW{background:var(--new)}
#dpanel{position:fixed; right:-420px; top:0; bottom:0; width:400px; max-width:92vw; background:var(--paper);
  border-left:1px solid var(--ink); z-index:60; overflow-y:auto; transition:right .28s; padding:20px 22px 30px}
#dpanel.open{right:0}
#dpDim{position:fixed; inset:0; background:#0004; z-index:55; opacity:0; pointer-events:none; transition:opacity .28s}
#dpDim.open{opacity:1; pointer-events:auto}
#dpanel .px{position:absolute; top:12px; right:14px; border:0; background:none; font-size:20px; cursor:pointer}
#dpanel .hero{width:100%; max-height:340px; object-fit:cover; border:1px solid var(--hair); display:block}
#dpanel .hgrid{display:grid; grid-template-columns:1fr 1fr; gap:5px}
#dpanel .hgrid img{width:100%; height:130px; object-fit:cover; border:1px solid var(--hair)}
#dpanel h2{font-family:'Playfair Display',serif; font-size:21px; margin:12px 0 2px}
#dpanel .k{font-size:9px; letter-spacing:.2em; color:var(--rising); text-transform:uppercase; font-weight:700; margin-top:14px}
#dpanel h5{font-size:10px; letter-spacing:.18em; text-transform:uppercase; color:var(--sub);
  border-top:1px solid var(--hair); padding-top:10px; margin:16px 0 7px}
#dpanel .ev{font-size:12px; line-height:1.7}
#dpanel .ev b{color:var(--rising)}
#dpanel .memo{background:#fff; border:1px solid var(--hair); padding:10px 12px; font-size:12px; line-height:1.6; white-space:pre-wrap}
#dpanel .chip{display:inline-block; background:var(--ink); color:#fff; font-size:10px; padding:3px 8px; margin:0 4px 5px 0; border-radius:2px}
#dpanel .chip.tag{background:#f4efe6; color:#8a8578; border:1px dashed #d8d2c4}
#dpanel .go{display:inline-block; margin-top:12px; font-size:11px; letter-spacing:.1em; color:var(--rising);
  text-decoration:none; border-bottom:1px solid var(--rising); font-weight:700}
.ntag{font-size:8px; font-weight:800; letter-spacing:.08em; padding:2px 6px; color:#fff; margin-left:4px; vertical-align:middle}
.ntag.KR{background:#1a7a4a}.ntag.GL{background:#2b5db8}.ntag.CN{background:#c8451f}
/* ── KEY BRAND ── */
#brandMain{padding:26px 30px}
#brandMain h2{font-family:'Playfair Display',serif; font-size:28px; border-bottom:1px solid var(--ink); padding-bottom:8px; margin-bottom:18px}
.bgrid{display:grid; grid-template-columns:repeat(auto-fill,minmax(300px,1fr)); gap:20px}
.bcard{background:#fff; border:1px solid var(--hair); padding:20px 22px; cursor:pointer; transition:transform .15s; position:relative; overflow:hidden}
.bcard:hover{transform:translateY(-3px)}
.bcard .peek{position:absolute; top:14px; right:0; width:132px; border:1px solid var(--hair);
  box-shadow:-4px 4px 10px #00000022; transform:translateX(105%); transition:transform .3s; z-index:2}
.bcard.open .peek{transform:translateX(34%)}
.bcard .gptline{max-height:0; overflow:hidden; transition:max-height .3s, padding .3s; font-size:11px; line-height:1.6;
  background:var(--sticky); padding:0 10px}
.bcard.open .gptline{max-height:200px; padding:8px 10px; margin-top:10px; overflow-y:auto}
.bcard .gptline a{color:var(--rising); text-decoration:none; border-bottom:1px solid var(--rising)}
.bcard .k{font-size:10px; letter-spacing:.2em; color:var(--sub); text-transform:uppercase; margin-bottom:8px}
.bcard h3{font-family:'Playfair Display',serif; font-size:26px; margin-bottom:10px}
.bcard .li{font-size:13px; line-height:1.6}
.bcard .foot{display:flex; justify-content:space-between; align-items:center; border-top:1px solid var(--hair); margin-top:14px; padding-top:12px}
.pill{font-size:10px; font-weight:800; letter-spacing:.12em; padding:5px 10px; color:#fff; background:var(--rising)}
.pill.WATCH{background:#cfc9bd; color:var(--ink)}
.pct{font-family:'Playfair Display',serif; font-size:26px; color:var(--rising)}
footer{border-top:1px solid var(--ink); padding:10px 26px; font-size:9px; letter-spacing:.18em; color:var(--sub); text-transform:uppercase}
.empty{padding:48px; text-align:center; color:var(--sub); font-size:13px}
#load{position:fixed; inset:0; background:var(--paper); display:flex; align-items:center; justify-content:center;
  flex-direction:column; gap:12px; z-index:40; font-size:11px; letter-spacing:.2em; color:var(--sub); text-transform:uppercase}
#load.done{display:none}
.spin{width:24px;height:24px;border:2px solid var(--hair);border-top-color:var(--ink);border-radius:50%;animation:sp .7s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
@media (prefers-reduced-motion:reduce){*{animation:none!important; transition:none!important}}
@media (max-width:720px){ #feedWrap{flex-direction:column} #dateRail{position:static; height:auto; width:100%; border-right:0; border-bottom:1px solid var(--hair); display:flex; overflow-x:auto} #dateRail .d{width:auto; white-space:nowrap} }
</style>
</head>
<body>

<header>
  <h1>TREND AGENT</h1>
  <div class="tabs">
    <button data-v="board" class="on">MAIN BOARD</button>
    <button data-v="feed">LIVE FEED</button>
    <button data-v="signal">TREND SIGNAL</button>
    <button data-v="brand">KEY BRAND</button>
    <a href="admin.html">+ 수집</a>
  </div>
  <span class="note" id="noteTxt">서로 다른 출처 3개+ 연결만 승격</span>
</header>

<div id="boardView" class="view on"><div id="boardMain"></div>
  <div style="padding:10px 22px 26px">
    <h2 style="font-family:'Playfair Display',serif;font-size:17px;margin:8px 0 10px">MAIN — 승격·지정된 피드</h2>
    <div id="boardFeed" class="feedgrid"><span class="mini">아직 MAIN 으로 승격된 피드가 없습니다 — 출처 3곳+ 또는 KEY TREND 지정</span></div>
  </div>
</div>

<div id="feedView" class="view">
  <div id="ffBar" style="padding:12px 22px 0;display:flex;flex-wrap:wrap;gap:6px;align-items:center"></div>
  <div id="feedWrap">
  <nav id="dateRail"></nav>
  <div id="feedMain"></div>
</div></div>

<div id="signalView" class="view" style="height:calc(100vh - 57px)">
  <iframe id="signalFrame" data-src="signal.html" style="width:100%;height:100%;border:0;display:block"></iframe>
</div>

<div id="brandView" class="view"><div id="brandMain">
  <h2>Key Brands <span style="font-size:12px;color:var(--sub);font-family:'Noto Sans KR'">— 수집 자료에서 언급된 브랜드 · 클릭하면 검증 노트와 관련 사진</span></h2>
  <div class="bgrid" id="bgrid"></div>
</div></div>

<aside id="dpanel">
  <button class="px" id="dpClose">×</button>
  <div id="dpBody"></div>
</aside>
<div id="dpDim"></div>
<footer>TREND AGENT · LIVE FEED &amp; KEY BRAND · SUPABASE</footer>
<div id="load"><div class="spin"></div><span>불러오는 중</span></div>

<script src="config.js"></script>
<script type="module">
console.log("TREND AGENT index.html v260723-12");
import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

/* ═══════════ 설정 — admin.html 과 같은 값 ═══════════ */
const SUPABASE_URL  = 'https://piifytwflubdtkzaiisi.supabase.co';
const SUPABASE_ANON  = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBpaWZ5dHdmbHViZHRremFpaXNpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQwODI5NDcsImV4cCI6MjA5OTY1ODk0N30.cVrgt7YQ99R-slePt8U2r_GmtDxetejZdqHcnqJmwhc';
/* ═════════════════════════════════════════════════ */

const sb = createClient(SUPABASE_URL, SUPABASE_ANON);
const $  = s => document.querySelector(s);
const esc = s => String(s ?? '').replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const ymNow = () => new Date().toISOString().slice(0,7);
const thumbCss = url => url
  ? `background-image:url(${esc(url)})`
  : 'background:linear-gradient(160deg,#d8cfc0,#a99a82)';

/* ═══ 데이터 ═══ */
let FEED = [], BRANDS = [], RISING = [], ENTS = [], EOF_ = {}, MSTAT = {}, SRCCNT = {}, PROPS = {};

async function load(){
  try{
    const [f, b, ents, cnts, ae, de, sg, pp] = await Promise.all([
      sb.from('v_feed').select('*').order('content_date',{ascending:false}).order('posted_at',{ascending:false}).limit(300),
      sb.from('v_key_brands').select('*').neq('status','Archived')
        .order('pinned',{ascending:false}).order('brand_name'),
      sb.from('entities').select('*').eq('status','Active'),
      sb.from('v_entity_source_count').select('*'),
      sb.from('asset_entities').select('entity_id,role,sort_order,images(image_id,thumb_url,is_main,created_at)'),
      sb.from('document_entities').select('doc_id,entity_id').limit(2000),
      sb.from('search_signals').select('entity_id,week,volume,source').limit(8000),
      sb.from('entity_proposals').select('*').limit(1000)
    ]);
    for(const r of [f,b,ents,cnts,ae]) if(r.error) throw r.error;
    FEED = f.data; BRANDS = b.data; ENTS = ents.data;

    SRCCNT = Object.fromEntries(cnts.data.map(r => [r.entity_id, r.source_count]));
    const cnt = SRCCNT;

    /* 자료 → 키워드 */
    EOF_ = {};
    for(const r of ae.data) if(r.images?.image_id) (EOF_['image:'+r.images.image_id] ||= []).push(r.entity_id);
    for(const r of (de.data||[]))                  (EOF_['doc:'+r.doc_id] ||= []).push(r.entity_id);

    /* 키워드 → 월별 언급량 (매체가 섞이지 않게 주된 소스 하나만) */
    const bySrc = {};
    for(const r of (sg.data||[])) ((bySrc[r.entity_id] ||= {})[r.source] ||= []).push(r);
    MSTAT = {};
    for(const [eid, srcs] of Object.entries(bySrc)){
      const pick = ['instagram','naver','sometrend','naver_blog','community','google','manual']
        .find(x => (srcs[x]||[]).length >= 2) || Object.keys(srcs)[0];
      const months = {};
      for(const r of (srcs[pick]||[])) months[r.week.slice(0,7)] = (months[r.week.slice(0,7)]||0) + (+r.volume);
      const keys = Object.keys(months).sort();
      if(!keys.length) continue;
      let topM = keys[0];
      for(const k of keys) if(months[k] > months[topM]) topM = k;
      const cur = months[keys[keys.length-1]], prev = keys.length > 1 ? months[keys[keys.length-2]] : null;
      MSTAT[eid] = { months, top:{ ym:topM, v:months[topM] }, curYm:keys[keys.length-1], cur,
        chg: prev ? Math.round((cur-prev)/prev*100) : null, src:pick };
    }
    PROPS = {};
    for(const r of (pp.data||[])) (PROPS[r.entity_id] ||= []).push(r);
    const cover = {};
    for(const r of ae.data){
      if(!r.images?.thumb_url) continue;
      const cur = cover[r.entity_id];
      const score = (r.images.is_main ? 100 : 0) + (r.role === 'cover' ? 10 : 0);
      if(!cur || score > cur.score) cover[r.entity_id] = { score, url: r.images.thumb_url };
    }
    RISING = ents.data
      .map(e => ({ ...e, src: cnt[e.entity_id] || 0, img: cover[e.entity_id]?.url }))
      .filter(e => e.pinned || e.src >= 1)
      .sort((a,b2) => (b2.pinned - a.pinned) || (b2.src - a.src) ||
                      String(b2.first_seen||'').localeCompare(String(a.first_seen||'')))
      .slice(0, 12);

    renderBoard(); renderFeed(); renderBrands();
  }catch(e){
    console.error(e);
    document.body.insertAdjacentHTML('afterbegin',
      `<div style="background:#c8451f;color:#fff;padding:12px 26px;font-size:13px">
        데이터를 불러오지 못했습니다 — ${esc(e.message)}. Supabase 주소와 키를 확인해주세요.</div>`);
  }
  $('#load').classList.add('done');
}

/* ═══ MAIN BOARD ═══ */
function renderBoard(){
  const cards = RISING.length ? RISING.map(e => {
    const badge = e.src >= 3 ? 'MAIN' : (e.first_seen === ymNow() ? 'NEW' : 'FEED');
    const meta = [
      esc(e.axis),
      esc([e.category_l1, e.category_l2].filter(Boolean).join(' › ')),
      `sources <b style="color:var(--rising)">${e.src}</b>`,
      e.first_seen ? `First seen ${esc(e.first_seen)}` : ''
    ].filter(Boolean).join(' · ');
    return `<div class="fcard" style="cursor:default">
      <span class="badge ${badge}">${badge === 'MAIN' ? 'MAIN BOARD' : badge}</span>
      <div class="th" style="${thumbCss(e.img)}"></div>
      <div class="bd"><h3>${esc(e.name_en || e.name_kr)}</h3><div class="meta">${meta}</div></div>
    </div>`;
  }).join('') : '<div class="empty" style="grid-column:1/-1">아직 올라온 트렌드가 없습니다.</div>';

  const mini = BRANDS.filter(b => b.signal === 'RISING' || b.pinned).slice(0, 6);
  const miniHtml = mini.length ? mini.map(b => `
    <div class="bcard" style="cursor:default">
      <div class="k">${esc(b.tier || '')} · ${esc(b.origin || '')}</div>
      <h3>${esc(b.brand_name)}</h3>
      <div class="li">${b.headline || '<span style="color:var(--sub)">연결된 트렌드 정보 없음</span>'}</div>
      <div class="foot"><span class="pill ${esc(b.signal)}">${esc(b.signal)}</span>
        <span class="pct">${esc(b.growth_pct || '')}</span></div>
    </div>`).join('') : '<div class="empty" style="grid-column:1/-1">떠오르는 브랜드가 아직 없습니다.</div>';

  $('#boardMain').innerHTML = `
    <div style="position:relative">
      <a href="map.html" target="_blank" rel="noopener"
         style="position:absolute;top:10px;right:22px;z-index:5;font-size:11px;letter-spacing:.1em;color:var(--rising);text-decoration:none;border-bottom:1px solid var(--rising);font-weight:700;background:var(--paper);padding:2px 6px">새 창으로 크게 ↗</a>
      <div id="mapWrap"><iframe id="mapFrame" src="map.html" title="Trend Map"></iframe></div>
    </div>`;
}

/* ═══ 우측 슬라이드 패널 — 피드·브랜드 카드 클릭 상세 ═══ */
const ENT_NAME = () => Object.fromEntries(ENTS.map(e => [e.entity_id, e.name_kr || e.name_en]));
const closeP = () => { $('#dpanel').classList.remove('open'); $('#dpDim').classList.remove('open'); };
$('#dpClose').onclick = closeP; $('#dpDim').onclick = closeP;
const openP = html => { $('#dpBody').innerHTML = html; $('#dpanel').classList.add('open'); $('#dpDim').classList.add('open'); };

async function openFeedPanel(it){
  openP('<div class="empty">불러오는 중…</div>');
  const names = ENT_NAME();
  let html = '';
  if(it.kind === 'image'){
    const [{ data:rec }, { data:lk }, { data:tg }] = await Promise.all([
      sb.from('images').select('*').eq('image_id', it.id).single(),
      sb.from('asset_entities').select('entity_id,role,trend_stage').eq('image_id', it.id),
      sb.from('asset_tags').select('tag_value').eq('image_id', it.id)
    ]);
    if(!rec) return openP('<div class="empty">자료를 찾지 못했습니다</div>');
    const kws = (lk||[]).filter(l=>l.role!=='movement').map(l =>
      `<span class="chip">${esc(names[l.entity_id]||l.entity_id)}${l.trend_stage?` · ${esc(l.trend_stage)}`:''}</span>`).join('');
    const mv = (lk||[]).find(l=>l.role==='movement');
    const tags = (tg||[]).map(t=>`<span class="chip tag">${esc(t.tag_value)}</span>`).join('');
    html = `
      ${rec.file_url||rec.thumb_url ? `<img class="hero" src="${esc(rec.file_url||rec.thumb_url)}" alt="">` : ''}
      <div class="k">${esc(it.badge==='MAIN'?'MAIN BOARD':it.badge)} · ${esc(rec.region||'')} · ${esc(rec.year_month||'')}</div>
      <h2>${esc(rec.note || rec.account || it.title)}</h2>
      <h5>Trend evidence</h5>
      <div class="ev">
        ${it.src_cnt ? `출처 <b>${it.src_cnt}곳</b>에서 포착${it.src_cnt>=3?' — MAIN 승격':''}<br>` : ''}
        ${mv ? `흐름 <b>↗ ${esc(names[mv.entity_id]||'')}</b><br>` : ''}
        ${rec.account ? `계정 ${esc(rec.account)}${rec.likes?` · 좋아요 ${(+rec.likes).toLocaleString()}`:''}<br>` : ''}
        ${rec.brand ? `브랜드 ${esc(rec.brand)}<br>` : ''}
        소스 ${esc(rec.source_id||'')}${rec.post_date?` · ${esc(rec.post_date)}`:''}
      </div>
      ${rec.note ? `<h5>Memo</h5><div class="memo">${esc(rec.note)}</div>` : ''}
      <h5>주요 키워드</h5><div>${kws + tags || '<span class="mini">연결된 키워드 없음</span>'}</div>
      ${rec.source_url ? `<a class="go" href="${esc(rec.source_url)}" target="_blank" rel="noopener">원문 보기 ↗</a>` : ''}`;
  } else {
    const [{ data:rec }, { data:lk }] = await Promise.all([
      sb.from('documents').select('*').eq('doc_id', it.id).single(),
      sb.from('document_entities').select('entity_id,relation_type').eq('doc_id', it.id)
    ]);
    if(!rec) return openP('<div class="empty">자료를 찾지 못했습니다</div>');
    const kws = (lk||[]).filter(l=>l.relation_type!=='movement').map(l =>
      `<span class="chip">${esc(names[l.entity_id]||l.entity_id)}</span>`).join('');
    const mv = (lk||[]).find(l=>l.relation_type==='movement');
    const tags = (rec.keywords||[]).map(t=>`<span class="chip tag">${esc(t)}</span>`).join('');
    html = `
      ${rec.thumb_url ? `<img class="hero" src="${esc(rec.thumb_url)}" alt="">` : ''}
      <div class="k">${esc(it.badge==='MAIN'?'MAIN BOARD':it.badge)} · ${esc(rec.region||'')} · ${esc(rec.year_month||'')}</div>
      <h2>${esc(rec.title || it.title)}</h2>
      <h5>Trend evidence</h5>
      <div class="ev">
        ${it.src_cnt ? `출처 <b>${it.src_cnt}곳</b>에서 포착${it.src_cnt>=3?' — MAIN 승격':''}<br>` : ''}
        ${mv ? `흐름 <b>↗ ${esc(names[mv.entity_id]||'')}</b><br>` : ''}
        ${rec.publisher ? `발행 ${esc(rec.publisher)}${rec.doc_date?` · ${esc(rec.doc_date)}`:''}<br>` : ''}
        ${rec.season ? `시즌 ${esc(rec.season)}<br>` : ''}
        소스 ${esc(rec.source_id||'')}
      </div>
      ${rec.summary ? `<h5>Summary</h5><div class="memo">${esc(rec.summary)}</div>` : ''}
      <h5>주요 키워드</h5><div>${kws + tags || '<span class="mini">연결된 키워드 없음</span>'}</div>
      ${rec.source_url ? `<a class="go" href="${esc(rec.source_url)}" target="_blank" rel="noopener">원문 보기 ↗</a>` : ''}`;
  }
  openP(html);
}

function openBrandPanel(b){
  const names = ENT_NAME();
  const photos = (b.photos||[]).slice(0,4);
  const linked = (b.linked_entities||[]).map(v =>
    `<span class="chip${String(v).startsWith('#')?' tag':''}">${esc(String(v).startsWith('#')?v:(names[v]||v))}</span>`).join('');
  const links = (b.links||[]).map(l=>`<a class="go" style="margin-right:12px" href="${esc(l.url)}" target="_blank" rel="noopener">${esc(l.label)} ↗</a>`).join('');
  openP(`
    ${photos.length ? `<div class="hgrid">${photos.map(p=>`<img src="${esc(p.thumb_url||p.file_url)}" alt="">`).join('')}</div>` : ''}
    <div class="k">${esc(b.tier||'')} · ${esc(b.origin||'')} · ${esc(b.signal||'')}${b.growth_pct?` · ${esc(b.growth_pct)}`:''}</div>
    <h2>${esc(b.brand_name)}</h2>
    ${b.headline ? `<div class="ev">${esc(b.headline)}</div>` : ''}
    <h5>Trend evidence</h5>
    <div class="memo">${esc(b.verify_note || '검증 노트가 아직 없습니다')}</div>
    <h5>연결 트렌드</h5><div>${linked || '<span class="mini">연결된 키워드 없음</span>'}</div>
    ${links ? `<div style="margin-top:6px">${links}</div>` : ''}`);
}

let FF = { brand:'ALL', region:'ALL', cat:'ALL' };
const FF_BRANDS = ['ALL','MLB','DISCOVERY','SERGIO TACCHINI','DUVETICA'];
const FF_CATS   = ['ALL','OUTERWEAR','TOP','BOTTOM','DRESS','BAG','SHOES','OTHER ACC'];

let FFOPEN = null;
const FF_GROUPS = [
  { key:'brand',  label:'브랜드',  opts:FF_BRANDS },
  { key:'region', label:'지역',    opts:['ALL','KR','GL','CN'] },
  { key:'cat',    label:'아이템',  opts:FF_CATS }
];
const ffLabel = (k, v) => v === 'ALL' ? '전체' : (v === 'SERGIO TACCHINI' ? 'ST' : v);

function drawFfBar(){
  const boxes = FF_GROUPS.map(g => `<button class="ffbox ${FFOPEN===g.key?'open':''} ${FF[g.key]!=='ALL'?'set':''}"
      data-ffg="${g.key}"><span class="k">${g.label}</span><span class="v">${esc(ffLabel(g.key, FF[g.key]))}</span>
      <span class="ar">${FFOPEN===g.key?'▴':'▾'}</span></button>`).join('');
  const open = FF_GROUPS.find(g => g.key === FFOPEN);
  const sub = open ? `<div class="ffsub">${open.opts.map(v =>
      `<button class="${FF[open.key]===v?'on':''}" data-ff="${open.key}:${v}">${esc(ffLabel(open.key, v))}</button>`).join('')}</div>` : '';
  $('#ffBar').innerHTML = `<div class="ffrow">${boxes}</div>${sub}`;
}
$('#ffBar').onclick = e => {
  const g = e.target.closest('[data-ffg]');
  if(g){ FFOPEN = FFOPEN === g.dataset.ffg ? null : g.dataset.ffg; drawFfBar(); return; }
  const t = e.target.closest('[data-ff]'); if(!t) return;
  const [k, v] = t.dataset.ff.split(':');
  FF[k] = v; FFOPEN = null; drawFfBar(); renderFeed();
};
const ffPass = it => {
  if(FF.region !== 'ALL' && (it.region || 'KR') !== FF.region) return false;
  if(FF.cat !== 'ALL' && (it.category || '') !== FF.cat) return false;
  if(FF.brand !== 'ALL'){
    const hay = `${it.brand || ''} ${it.meta || ''}`.toUpperCase();
    if(!hay.includes(FF.brand.toUpperCase())) return false;
  }
  return true;
};

const BARC = ['#e8657f','#f0a94e','#48b39a'];        // 코랄 · 앰버 · 틸

/* 월별 추이로 트렌드 단계를 판정합니다
   PEAK       역대 최고 근처에서 상승세가 꺾여 평탄해짐
   ON-GOING   아직 오르는 중
   CLASSIC    6개월 이상 꾸준 — 기복이 작음
   DECREASING 최근 뚜렷한 하락 */
function stageOf(st){
  if(!st) return null;
  const ks = Object.keys(st.months).sort();
  const vs = ks.map(k => st.months[k]);
  if(vs.length < 2) return 'NEW';
  const chg = st.chg ?? 0;
  const ratio = st.cur / (st.top.v || 1);
  if(vs.length >= 6){
    const mean = vs.reduce((a,b)=>a+b,0) / vs.length;
    const sd = Math.sqrt(vs.reduce((a,b)=>a+(b-mean)**2,0) / vs.length);
    if(mean > 0 && sd/mean < 0.28 && chg > -15) return 'CLASSIC';
  }
  if(chg <= -20 || (ratio < 0.55 && chg < 0)) return 'DECREASING';
  if(ratio >= 0.9) return chg >= 25 ? 'ON-GOING' : 'PEAK';   // 아직 가파르면 진행 중, 평탄해지면 정점
  return 'ON-GOING';
}
const nf = n => Math.round(n).toLocaleString();

function fcardHtml(it, i){
  const rgn  = ['KR','GL','CN'].includes(it.region) ? it.region : 'KR';
  const words = String(it.meta || '').split(/\s+/);
  const tags = words.filter(w => w.startsWith('#')).slice(0, 5);
  const rest = words.filter(w => w && !w.startsWith('#')).join(' ');

  /* 이 자료에 붙은 키워드 중 수치가 있는 것 */
  const eids = EOF_[`${it.kind}:${it.id}`] || [];
  const eid  = eids.find(x => MSTAT[x]) || eids[0];
  const st   = eid ? MSTAT[eid] : null;
  const col  = BARC[i % BARC.length];

  let barPct, statLine;
  if(st){
    barPct = Math.max(12, Math.round(st.cur / (st.top.v || 1) * 100));
    const up = st.chg;
    statLine = `월 최고 <b>${nf(st.top.v)}건</b> (${esc(st.top.ym.replace('-','.'))})` +
      (up == null ? '' : ` · 전월 대비 <b style="color:${up>=0?'#c8451f':'#1a7a4a'}">${up>=0?'+':''}${up}%</b>`);
  }else{
    const c = eid ? (SRCCNT[eid] || 0) : 0;
    barPct = Math.max(10, Math.min(100, c * 14));
    statLine = c ? `서로 다른 출처 <b>${c}곳</b>에서 포착` : `<span style="color:var(--sub)">수치 미연결 — 키워드를 붙이면 추이가 나옵니다</span>`;
  }

  const src  = [it.source_id, it.category].filter(Boolean).join(' · ');
  /* 내용 요약 한 줄 — 노트에서 브랜드·해시태그를 걷어낸 부분 */
  const line = (rest.replace(new RegExp(`^${it.brand || '_'}\\s*`,'i'), '').trim() || String(it.title))
    .replace(/\s+/g, ' ').slice(0, 52);

  /* 브랜드 적용 — 관리자에서 만든 제안이 있으면 그대로 */
  const pr = (PROPS[eid] || [])[0];
  const applyBrand = pr?.brand || ((it.brand_fit || []).find(x => x !== 'ALL')) || 'MLB';
  const applyItem  = it.category_sub || it.category || '';
  const point = pr?.body
    ? String(pr.body).split(/[.。]\s|—|·/)[0].replace(/\s+/g,' ').trim().slice(0, 44)
    : null;
  const applyLine = point
    ? `<div class="apply"><b>${esc(applyBrand)}${applyItem ? ' · '+esc(applyItem) : ''} 적용</b> — ${esc(point)}</div>`
    : (eid ? `<div class="apply muted"><b>${esc(applyBrand)}${applyItem ? ' · '+esc(applyItem) : ''} 적용</b> — 관리자 [💡 적용 제안] 에서 생성</div>` : '');

  const stg = stageOf(st);

  return `<a class="fcard" href="#" data-fk="${esc(it.kind)}:${esc(it.id)}">
    <div class="fl">
      <div class="hd"><span class="rk">${String(i+1).padStart(2,'0')}</span>
        <h3>${esc(String(it.title).slice(0,34))}<span class="ntag ${rgn}">${rgn}</span></h3></div>
      <div class="sub">${esc(src)}</div>
      <div class="line">${esc(line)}</div>
      <div class="bar"><i style="width:${barPct}%;background:${col}"></i></div>
      <div class="stat">${statLine}</div>
      ${applyLine}
      ${tags.length ? `<div class="tags">${tags.map(t=>`<span>${esc(t)}</span>`).join('')}</div>` : ''}
    </div>
    ${it.thumb_url ? `<img class="ph" src="${esc(it.thumb_url)}" loading="lazy" alt="">`
                   : '<div class="ph noimg"></div>'}
    ${stg ? `<span class="stg ${stg.replace('-','')}">${stg}</span>` : ''}
  </a>`;
}

/* ═══ LIVE FEED ═══ */
function renderFeed(){
  if(!$('#ffBar').innerHTML) drawFfBar();
  const rail = $('#dateRail'), main = $('#feedMain');
  rail.innerHTML = ''; main.innerHTML = '';
  if(!FEED.length){ main.innerHTML = '<div class="empty">아직 수집된 자료가 없습니다.</div>'; return; }

  const groups = new Map();
  for(const it of FEED.filter(ffPass)){
    const d = it.year_month || String(it.content_date || it.posted_at).slice(0,7);   // 월 단위
    if(!groups.has(d)) groups.set(d, []);
    groups.get(d).push(it);
  }
  /* 최신 월이 맨 위 — 아래로 갈수록 예전 */
  const sortedGroups = new Map([...groups.entries()].sort((a,b) => b[0].localeCompare(a[0])));
  groups.clear(); sortedGroups.forEach((v,k) => groups.set(k, v));

  let first = true;
  for(const [d, items] of groups){
    const db = document.createElement('button');
    db.className = 'd' + (first ? ' on' : ''); db.textContent = d;
    db.onclick = () => {
      $('#g-' + d).scrollIntoView({ behavior:'smooth', block:'start' });
      rail.querySelectorAll('.d').forEach(x => x.classList.toggle('on', x === db));
    };
    rail.appendChild(db);
    first = false;

    const sec = document.createElement('section');
    sec.className = 'dgroup'; sec.id = 'g-' + d;
    sec.innerHTML = `<h2>${esc(d)}</h2><div class="feedgrid">` + items.map(fcardHtml).join('') + '</div>';
    main.appendChild(sec);
  }
  /* 메인보드 하단 — MAIN 뱃지 피드만 */
  const mains = FEED.filter(x => x.badge === 'MAIN').slice(0, 28);
  if(mains.length) $('#boardFeed').innerHTML = mains.map(fcardHtml).join('');
}
document.addEventListener('click', e => {
  const a = e.target.closest('[data-fk]'); if(!a) return;
  e.preventDefault();
  const [kind, id] = a.dataset.fk.split(':');
  const it = FEED.find(x => x.kind === kind && String(x.id) === id);
  if(it) openFeedPanel(it);
});

/* ═══ KEY BRAND ═══ */
function renderBrands(){
  const bg = $('#bgrid');
  if(!BRANDS.length){ bg.innerHTML = '<div class="empty" style="grid-column:1/-1">등록된 브랜드가 없습니다.</div>'; return; }
  bg.innerHTML = BRANDS.map(b => {
    const photos = b.photos || [];
    const links = (b.links || []).map(l =>
      `<a href="${esc(l.url)}" target="_blank" rel="noopener">${esc(l.label)} ↗</a>`).join(' · ');
    const note = [b.verify_note ? esc(b.verify_note) : '', links].filter(Boolean).join('<br>');
    return `<div class="bcard">
      <div class="k">${esc(b.tier || '')} · ${esc(b.origin || '')}</div>
      <h3>${esc(b.brand_name)}</h3>
      <div class="li">${b.headline || '<span style="color:var(--sub)">연결된 트렌드 정보 없음</span>'}</div>
      ${photos.length ? `<img class="peek" src="${esc(photos[0].thumb_url || photos[0].file_url)}" alt="" loading="lazy">` : ''}
      <div class="gptline">${note || '<span style="color:var(--sub)">검증 노트가 아직 없습니다.</span>'}</div>
      <div class="foot"><span class="pill ${esc(b.signal)}">${esc(b.signal)}</span>
        <span class="pct">${esc(b.growth_pct || '')}</span></div>
    </div>`;
  }).join('');
  bg.onclick = e => {
    if(e.target.closest('a')) return;
    const c = e.target.closest('.bcard'); if(!c) return;
    const b = BRANDS[[...bg.children].indexOf(c)];
    if(b) openBrandPanel(b);
  };
}
